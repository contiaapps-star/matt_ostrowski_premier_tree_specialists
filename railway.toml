# Railway deployment configuration for the Premier Tree Specialists
# lead intake dashboard. See https://docs.railway.app/reference/config-as-code
# for the full schema.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# A persistent volume must be mounted at /data so the SQLite file
# survives across deploys. Configure it in the Railway dashboard:
#   Service → Variables → Volume → mount path = /data
#
# Required environment variables (see .env.example for full list):
#   SESSION_SECRET                — strong random string, ≥16 chars
#   OPENROUTER_API_KEY            — for live LLM calls
#   OPENROUTER_MODEL              — leaderboard SoTA at deploy time
#   SENDGRID_API_KEY              — for outbound email
#   AGENT_PHONE_API_KEY           — for outbound SMS
#   AGENT_PHONE_NUMBER            — sender phone (E.164)
#   ARBOSTAR_COMPANY_ID           — tenant id
#   ARBOSTAR_API_KEY              — tenant API key
#   GMAIL_INBOUND_ADDRESS         — operational inbox (LSA + AnswerForce forwards)
#   GMAIL_OAUTH_REFRESH_TOKEN     — OAuth refresh for Gmail polling
#   WEBSITE_FORM_WEBHOOK_SECRET   — shared secret with the Vercel form
#   INTEGRATION_MODE              — `live` after smoke tests pass
#   CONFIDENCE_AUTO_SEND_THRESHOLD — default 0.80, tunable
#   CONFIDENCE_DRAFT_THRESHOLD    — default 0.50, tunable

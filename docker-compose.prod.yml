services:
  app:
    build:
      context: .
      target: runtime
    image: premier-tree-intake:latest
    command: ["node", "dist/server.js"]
    volumes:
      - db-data:/data
      - backups:/backups
    env_file: .env.production
    environment:
      NODE_ENV: production
      DATABASE_PATH: /data/leads.db
      PORT: 5000
    ports:
      - "${PORT:-5000}:5000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db-data:
  backups:
